name: flutter_material_design_icons
description: This package provides over 7000+ material icons from the Material Design Icons (MDI) project.
version: 3.0.0+7447
resolution: workspace
homepage: https://github.com/FaFre/flutter_material_design_icons

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  build_runner: ^2.12.2
  builder:
    path: ../builder
  flutter_test:
    sdk: flutter
  lint: ^2.8.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  fonts:
    - family: Material Design Icons
      fonts:
        - asset: assets/materialdesignicons-webfont.ttf
